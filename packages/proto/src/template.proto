syntax="proto3";
package template;

service TemplateProtoService {
  rpc GetTemplateDetails(GetTemplateDetailsRequest) returns (GetTemplateDetailsResponse);
}


message GetTemplateDetailsRequest {
  string templateId =1;
}

message EmailChannel {
  string subject = 1;
  string body = 2;
}

message SmsChannel {
  string body = 1;
}

message WhatsappChannel {
  string body = 1;
}

message TemplateChannels {
  EmailChannel email = 1;
  SmsChannel sms = 2;
  WhatsappChannel whatsapp = 3;
}

message GetTemplateDetailsResponse {
  string id = 1;
  string name = 2;
  TemplateChannels channels = 3;
  string variables = 4;   
  bool aiGenerated = 5;
  string globalUserId = 6;
  string projectId = 7;
  string createdAt = 8;
  string updatedAt = 9;
}
